name: Automated Underwriting Server CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: '**/requirements.txt'
        # Creating a placeholder requirements.txt or ignoring cache if it doesn't exist
        
    - name: Install Development Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black
        
    - name: Code Format Check (Black)
      run: |
        # Check formatting but don't fail CI for a demo repository; just log it
        black --check . || echo "Formatting issues detected, but letting CI pass for review."

    - name: Code Linter Check (Flake8)
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Core Underwriting MCP Server Integration Tests
      run: |
        python test_client.py
